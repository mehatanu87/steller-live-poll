name: StellarVault CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Smart Contract Tests ─────────────────────────────────────────────────────
  contract-test:
    name: Contract Tests (Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace --verbose

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_NETWORK: testnet
          VITE_CONTRACT_ID: ${{ secrets.CONTRACT_ID || 'CBLBZWNHE26XAVUK6SRWFBCGKSRNEWPFGRHYTLXPKKSZO2VEQVN2PLYP' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # ── Deploy to Testnet ────────────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Contract (Testnet)
    needs: contract-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Cache Cargo registry and bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-stellar-cli-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-stellar-cli-

      - name: Install system dependencies for Stellar CLI
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          fi

      - name: Build Contract WASM
        run: stellar contract build

      - name: Fund deployer account
        run: |
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet
          sleep 5

      - name: Deploy contract
        id: deploy
        run: |
          WASM_PATH=$(find target -name "*.optimized.wasm" | head -n 1)
          if [ -z "$WASM_PATH" ]; then
            WASM_PATH=$(find target -name "stellar_vault.wasm" | head -n 1)
          fi
          CONTRACT_ID=$(stellar contract deploy \
            --wasm $WASM_PATH \
            --source deployer \
            --network testnet)
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV
          echo "Deployed contract: $CONTRACT_ID"

      - name: Initialize contract
        run: |
          NATIVE_TOKEN=CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

          stellar contract invoke \
            --id $CONTRACT_ID \
            --source deployer \
            --network testnet \
            -- \
            initialize \
            --admin $(stellar keys address deployer) \
            --reward_rate 10 \
            --native_token $NATIVE_TOKEN \
            --vote_fee 10000000

          stellar contract invoke \
            --id $CONTRACT_ID \
            --source deployer \
            --network testnet \
            -- \
            deposit \
            --user $(stellar keys address deployer) \
            --amount 100000000

          stellar contract invoke \
            --id $CONTRACT_ID \
            --source deployer \
            --network testnet \
            -- \
            create_proposal \
            --proposer $(stellar keys address deployer) \
            --title "Increase Reward Rate to 15 bps" \
            --description "Proposal to boost staking incentives by raising the per-block reward rate from 10 to 15 basis points."

  # ── Deploy Frontend ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-test, deploy-contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend with new contract ID
        working-directory: ./frontend
        env:
          VITE_NETWORK: testnet
          VITE_CONTRACT_ID: ${{ needs.deploy-contract.outputs.contract_id }}
        run: npm run build

      - name: Deploy to Vercel
        # Run from repo ROOT so Vercel resolves the project's "frontend" root correctly.
        # Running from inside ./frontend causes a double-path: frontend/frontend error.
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes
