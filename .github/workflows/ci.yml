name: StellarVault CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Smart Contract Tests ─────────────────────────────────────────────────────
  contract-test:
    name: Contract Tests (Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace --verbose

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_NETWORK: testnet
          VITE_CONTRACT_ID: ${{ secrets.CONTRACT_ID || 'CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # ── Deploy to Testnet ────────────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Contract (Testnet)
    needs: contract-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-stellar-cli-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-stellar-cli-

      - name: Install system dependencies for Stellar CLI
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          fi

      - name: Build Contract WASM
        run: stellar contract build

      - name: Fund deployer account
        run: |
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet

      - name: Deploy contract
        run: |
          WASM_PATH=$(find target/wasm32-unknown-unknown/release -name "*.optimized.wasm" | head -n 1)
          if [ -z "$WASM_PATH" ]; then
            WASM_PATH="target/wasm32-unknown-unknown/release/stellar_vault.wasm"
          fi
          CONTRACT_ID=$(stellar contract deploy \
            --wasm $WASM_PATH \
            --source deployer \
            --network testnet)
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV
          echo "Deployed contract: $CONTRACT_ID"

      - name: Initialize contract
        run: |
          stellar contract invoke \
            --id $CONTRACT_ID \
            --source deployer \
            --network testnet \
            -- initialize \
            --admin $(stellar keys address deployer) \
            --reward_rate 10

  # ── Deploy Frontend ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-test, deploy-contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
